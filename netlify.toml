[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/letters-of-love"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/letters-of-love/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/quiz"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/quiz/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
